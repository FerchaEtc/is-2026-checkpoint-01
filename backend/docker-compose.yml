services:
  database:
    image: postgres:16-alpine
    container_name: teamboard-db
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_pass}
      POSTGRES_DB: ${DB_NAME:-teamboard_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-teamboard_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - teamboard-network

  backend:
    build: ./backend
    container_name: teamboard-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: database
      DB_NAME: ${DB_NAME:-teamboard_db}
      DB_USER: ${DB_USER:-admin}
      DB_PASS: ${DB_PASSWORD:-admin_pass}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - teamboard-network

  frontend:
    build: ./frontend
    container_name: teamboard-frontend
    ports:
      - "8080:8080"
    networks:
      - teamboard-network

networks:
  teamboard-network:

volumes:
  postgres_data:
